server:
  port: 8082

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/flow_board_notification_service_db
    username: root
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

security:
  jwt:
    secret: ${jwt-secret-key}

brevo:
  api-key: ${brevo-api-key}
  sender:
    email: ${brevo-sender-mail}
    name: FlowBoard

domain:
  url: "http://localhost:8080/api/v1/"


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: notification-exchange
  queue:
    name: notification-queue
  routing:
    key: notification-key

