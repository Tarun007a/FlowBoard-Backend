server:
  port: 8082

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:mysql://localhost:3306/flow_board_notification_service_db
    username: root
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

  boot:
    admin:
      client:
        url: http://localhost:9090

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    endpoint:
      health:
        show-details: always

security:
  jwt:
    secret: ${jwt-secret-key}

brevo:
  api-key: ${brevo-api-key}
  sender:
    email: ${brevo-sender-mail}
    name: FlowBoard

domain:
  url: "http://localhost:8080/api/v1/"


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: notification-exchange
  queue:
    single:
      name: single-notification-queue
    bulk:
      name: bulk-notification-queue
  routing:
    single:
      key: single-notification-key
    bulk:
      key: bulk-notification-key

