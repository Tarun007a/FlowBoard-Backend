server:
  port: 8082

spring:
  application:
    name: notification-service

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true


  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
#    host: rabbitmq
    host: localhost
    port: 5672
    username: guest
    password: guest

  boot:
    admin:
      client:
        url: http://localhost:9090
#        url: http://admin:9090

management:
  endpoints:
    web:
      exposure:
        include: "*"

  endpoint:
    health:
      show-details: always

brevo:
  api-key: ${brevo_api_key}
  sender:
    email: ${brevo_sender_mail}
    name: FlowBoard

domain:
  url: "http://localhost:8080/api/v1/"


eureka:
  client:
    service-url:
#      defaultZone: http://eureka:8761/eureka/
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
#    hostname: notification-service
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: notification-exchange
  queue:
    single:
      name: single-notification-queue
    bulk:
      name: bulk-notification-queue
  routing:
    single:
      key: single-notification-key
    bulk:
      key: bulk-notification-key

resilience4j:
  circuitbreaker:
    instances:
      AUTH-SERVICE:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3

