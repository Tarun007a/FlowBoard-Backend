server:
  port: 8084

spring:
  application:
    name: workspace-service

  datasource:
    url: jdbc:mysql://localhost:3306/flow_board_workspace_service_db
    username: root
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true