server:
  port: 8087

spring:
  application:
    name: card-service

  datasource:
    url: jdbc:mysql://localhost:3306/flow_board_card_service_db
    username: root
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: notification-exchange
  queue:
    name: notification-queue
  routing:
    key: notification-key