server:
  port: 8087

spring:
  application:
    name: card-service

  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

  rabbitmq:
#    host: rabbitmq
    host: localhost
    port: 5672
    username: guest
    password: guest

  boot:
    admin:
      client:
#        url: http://admin:9090
        url: http://localhost:9090

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    endpoint:
      health:
        show-details: always


eureka:
  client:
    service-url:
#      defaultZone: http://eureka:8761/eureka/
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
#    hostname: card-service
    prefer-ip-address: true

rabbitmq:
  exchange:
    name: notification-exchange
  queue:
    single:
      name: single-notification-queue
    bulk:
      name: bulk-notification-queue
  routing:
    single:
      key: single-notification-key
    bulk:
      key: bulk-notification-key

resilience4j:
  circuitbreaker:
    instances:
      AUTH-SERVICE:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3