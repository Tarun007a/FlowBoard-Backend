server:
  port: 8080

spring:
  application:
    name: flowboard-api-gateway

  data:
    redis:
#      here we are using redis as we are running all this in docker and the redis is running in
#      a docker container named redis
      host: localhost
#      host: redis
      port: 6379

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**

        - id: oauth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/oauth2/**

        - id: oauth-callback
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/login/oauth2/**

        - id: user-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/user/**

        - id: admin-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/admin/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**

        - id: comment-service
          uri: lb://COMMENT-SERVICE
          predicates:
            - Path=/api/v1/comments/**

        - id: attachment-service
          uri: lb://COMMENT-SERVICE
          predicates:
            - Path=/api/v1/attachments/**

        - id: workspace-service
          uri: lb://WORKSPACE-SERVICE
          predicates:
            - Path=/api/v1/workspaces/**

        - id: board-service
          uri: lb://BOARD-SERVICE
          predicates:
            - Path=/api/v1/boards/**

        - id: board-member-service
          uri: lb://BOARD-SERVICE
          predicates:
            - Path=/api/v1/board-members/**

        - id: list-service
          uri: lb://LIST-SERVICE
          predicates:
            - Path=/api/v1/lists/**

        - id: card-service
          uri: lb://CARD-SERVICE
          predicates:
            - Path=/api/v1/cards/**

        - id: subscription-service
          uri: lb://SUBSCRIPTION-SERVICE
          predicates:
            - Path=/api/v1/subscriptions/**

        - id: analytics-service
          uri : lb://ANALYTICS-SERVICE
          predicates:
            - Path=/api/v1/analytics/**

  boot:
    admin:
      client:
#        here also we are changing from localhost to eureka because of docker
        url: http://localhost:9090
#        url: http://admin:9090

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    endpoint:
      health:
        show-details: always


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

security:
  jwt:
    secret: ${jwt-secret-key}











