server:
  port: 8080

spring:
  application:
    name: flowboard-api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**

        - id: user-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/user/**

        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/v1/notifications/**

        - id: comment-service
          uri: lb://COMMENT-SERVICE
          predicates:
            - Path=/api/v1/comments/**

        - id: attachment-service
          uri: lb://COMMENT-SERVICE
          predicates:
            - Path=/api/v1/attachments/**

        - id: workspace-service
          uri: lb://WORKSPACE-SERVICE
          predicates:
            - Path=/api/v1/workspaces/**

        - id: board-service
          uri: lb://BOARD-SERVICE
          predicates:
            - Path=/api/v1/boards/**

        - id: board-member-service
          uri: lb://BOARD-SERVICE
          predicates:
            - Path=/api/v1/board-members/**

        - id: list-service
          uri: lb://LIST-SERVICE
          predicates:
            - Path=/api/v1/lists/**

        - id: card-service
          uri: lb://CARD-SERVICE
          predicates:
            - Path=/api/v1/cards/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

security:
  jwt:
    secret: ${jwt-secret-key}










