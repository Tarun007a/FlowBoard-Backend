server:
  port: 8086

spring:
  application:
    name: list-service

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update


  boot:
    admin:
      client:
#        url: http://admin:9090
        url: http://localhost:9090

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    endpoint:
      health:
        show-details: always


eureka:
  client:
    service-url:
#      defaultZone: http://eureka:8761/eureka/
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
#    hostname: list-service
    prefer-ip-address: true

resilience4j:
  circuitbreaker:
    instances:
      AUTH-SERVICE:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3