server:
  port:
    8088

spring:
  application:
    name: subscription-service

  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  jpa:
    hibernate:
      ddl-auto: update

  boot:
    admin:
      client:
#        url: http://admin:9090
        url: http://localhost:9090

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    endpoint:
      health:
        show-details: always



razorpay:
  key-id: ${RAZOR_PAY_API_KEY}
  key-secret: ${RAZOR_PAY_SECRET_KEY}


eureka:
  client:
    service-url:
#      defaultZone: http://eureka:8761/eureka/
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
#    hostname: subscription-service
    prefer-ip-address: true