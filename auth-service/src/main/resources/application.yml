server:
  port: 8081
  forward-headers-strategy: framework

spring:
  application:
    name: auth-service

  datasource:
    url: ${db_url}
    username: ${db_username}
    password: ${db_password}

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${google_client_id}
            client-secret: ${google_client_secret}


  jpa:
    hibernate:
      ddl-auto: update

  boot:
    admin:
      client:
#        url: http://admin:9090
        url: http://localhost:9090

  management:
    endpoints:
      web:
        exposure:
          include: "*"

    endpoint:
      health:
        show-details: always

security:
  jwt:
    secret: ${jwt-secret-key}

brevo:
  api-key: ${brevo-api-key}
  sender:
    email: ${brevo-sender-mail}
    name: FlowBoard

domain:
  url: ${frontend_url}

eureka:
  client:
    service-url:
#      defaultZone: http://eureka:8761/eureka/
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
#    hostname: auth-service
    prefer-ip-address: true

admin:
  verification:
    mail: ${admin-verification-mail}